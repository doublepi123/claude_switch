name: Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  GO_VERSION: '1.22'
  PROJECT_NAME: claude-switch

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos:
          - darwin
          - linux
          - windows
        goarch:
          - amd64
          - arm64
        exclude:
          - goos: windows
            goarch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXTENSION=""
          if [ "$GOOS" = "windows" ]; then
            EXTENSION=".exe"
          fi
          OUTPUT_NAME="${{ env.PROJECT_NAME }}-${GOOS}-${GOARCH}${EXTENSION}"
          echo "OUTPUT_NAME=$OUTPUT_NAME" >> $GITHUB_ENV
          go build -ldflags="-s -w" -o "$OUTPUT_NAME" .

          # Rename binary to "cs" before packaging so tarball extracts directly to "cs"
          if [ "$GOOS" = "windows" ]; then
            mv "$OUTPUT_NAME" "cs.exe"
            zip "${{ env.PROJECT_NAME }}-${GOOS}-${GOARCH}.zip" "cs.exe"
          else
            mv "$OUTPUT_NAME" cs
            tar czf "${{ env.PROJECT_NAME }}-${GOOS}-${GOARCH}.tar.gz" cs
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ env.PROJECT_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz
            ${{ env.PROJECT_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}.zip
          retention-days: 90

  release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        id: tag
        run: |
          git fetch --tags --force
          CURRENT_TAG=$(git tag --points-at HEAD --list 'v*' | sort -V | tail -n 1)
          if [ -n "$CURRENT_TAG" ]; then
            echo "tag=$CURRENT_TAG" >> $GITHUB_OUTPUT
            echo "Commit already tagged as $CURRENT_TAG"
          else
            LAST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -n 1)
            LAST_TAG=${LAST_TAG:-v0.0.0}
            major=$(echo "$LAST_TAG" | cut -d. -f1 | tr -d v)
            minor=$(echo "$LAST_TAG" | cut -d. -f2)
            patch=$(echo "$LAST_TAG" | cut -d. -f3)
            new_patch=$((patch + 1))
            NEW_TAG="v${major}.${minor}.${new_patch}"
            while git rev-parse -q --verify "refs/tags/$NEW_TAG" >/dev/null; do
              new_patch=$((new_patch + 1))
              NEW_TAG="v${major}.${minor}.${new_patch}"
            done
            echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT
            echo "Created tag: $NEW_TAG"
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
          fi

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/${{ env.PROJECT_NAME }}-darwin-amd64/${{ env.PROJECT_NAME }}-darwin-amd64.tar.gz
            artifacts/${{ env.PROJECT_NAME }}-darwin-arm64/${{ env.PROJECT_NAME }}-darwin-arm64.tar.gz
            artifacts/${{ env.PROJECT_NAME }}-linux-amd64/${{ env.PROJECT_NAME }}-linux-amd64.tar.gz
            artifacts/${{ env.PROJECT_NAME }}-linux-arm64/${{ env.PROJECT_NAME }}-linux-arm64.tar.gz
            artifacts/${{ env.PROJECT_NAME }}-windows-amd64/${{ env.PROJECT_NAME }}-windows-amd64.zip
